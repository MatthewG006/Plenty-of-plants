
# Specifies the version of the App Hosting configuration
runConfig:
  # Defines the environment variables that will be available to your application
  environment:
    # This variable will hold the Gemini API key for server-side use
    - variable: GEMINI_API_KEY
      # References the secret stored in Google Cloud Secret Manager
      secret: GEMINI_API_KEY

    # This variable will hold the PayPal Client ID for client-side use
    - variable: NEXT_PUBLIC_PAYPAL_CLIENT_ID
      # References the secret stored in Google Cloud Secret Manager
      secret: PAYPAL_CLIENT_ID

    # Firebase Configuration
    - variable: NEXT_PUBLIC_FIREBASE_API_KEY
      secret: FIREBASE_API_KEY
    - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      secret: FIREBASE_AUTH_DOMAIN
    - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
      secret: FIREBASE_PROJECT_ID
    - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      secret: FIREBASE_STORAGE_BUCKET
    - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      secret: FIREBASE_MESSAGING_SENDER_ID
    - variable: NEXT_PUBLIC_FIREBASE_APP_ID
      secret: FIREBASE_APP_ID
