
steps:
  # Install dependencies
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install']

  # Debugging Step: Print specific environment variables to verify secrets
  - name: 'gcr.io/cloud-builders/bash'
    args:
      - '-c'
      - |
        echo "--- VERIFYING SECRET ENVIRONMENT VARIABLES ---"
        echo "GEMINI_API_KEY is present: $GEMINI_API_KEY"
        echo "NEXT_PUBLIC_PAYPAL_CLIENT_ID is present: $NEXT_PUBLIC_PAYPAL_CLIENT_ID"
        echo "NEXT_PUBLIC_FIREBASE_API_KEY is present: $NEXT_PUBLIC_FIREBASE_API_KEY"
        echo "--- FINISHED VERIFICATION ---"
    secretEnv:
      - GEMINI_API_KEY
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID
      - NEXT_PUBLIC_FIREBASE_API_KEY

  # Build the Next.js application
  # The secretEnv makes the secrets available as environment variables to this step
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    secretEnv:
      - GEMINI_API_KEY
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID
      - NEXT_PUBLIC_FIREBASE_API_KEY

availableSecrets:
  secretManager:
    # Gemini API Key for server-side Genkit
    - versionName: projects/plentyofplants-108e8/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'

    # PayPal Client ID, prefixed for client-side access in Next.js
    - versionName: projects/plentyofplants-108e8/secrets/PAYPAL_CLIENT_ID/versions/latest
      env: 'NEXT_PUBLIC_PAYPAL_CLIENT_ID'

    # Firebase API Key, prefixed for client-side access in Next.js
    - versionName: projects/plentyofplants-108e8/secrets/FIREBASE_API_KEY/versions/latest
      env: 'NEXT_PUBLIC_FIREBASE_API_KEY'
